<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · ITMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }

    .login-wrap {
      width: 100%; max-width: 440px; padding: 0 1rem;
    }

    .brand {
      text-align: center; margin-bottom: 2rem;
    }
    .brand .logo-icon {
      font-size: 3rem; display:block; margin-bottom: .4rem;
    }
    .brand h1 {
      font-size: 1.6rem; font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 0;
    }
    .brand p { color: var(--text-muted); font-size: .85rem; margin-top:.3rem; }

    /* Role tabs */
    .role-tabs {
      display: flex; gap: .5rem; margin-bottom: 1.5rem;
    }
    .role-tab {
      flex: 1; padding: .6rem .3rem; text-align: center;
      border: 1px solid var(--glass-border);
      background: transparent; border-radius: var(--radius);
      color: var(--text-muted); cursor: pointer; font-size: .85rem;
      transition: all .2s;
    }
    .role-tab.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent); font-weight: 600;
    }

    .role-panel { display: none; }
    .role-panel.active { display: block; }

    .divider {
      display: flex; align-items: center; gap: .7rem;
      color: var(--text-muted); font-size: .8rem; margin: 1.2rem 0;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background: var(--glass-border);
    }
  </style>
</head>
<body>
  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="login-wrap">
    <div class="brand">
      <span class="logo-icon">🚦</span>
      <h1>ITMS</h1>
      <p>Intelligent Traffic Management System</p>
    </div>

    <div class="glass-card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Role selector tabs -->
      <div class="role-tabs">
        <button class="role-tab active" data-role="public" onclick="switchRole('public')">
          🚗 Driver
        </button>
        <button class="role-tab" data-role="ambulance" onclick="switchRole('ambulance')">
          🚑 Ambulance
        </button>
        <button class="role-tab" data-role="admin" onclick="switchRole('admin')">
          🔒 Admin
        </button>
      </div>

      <!-- Public / Admin login form -->
      <div class="role-panel active" id="panel-public">
        <form method="POST" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="role" value="public">
          <div class="form-group">
            <label>Email or Username</label>
            <input type="text" name="identifier" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
      </div>

      <!-- Ambulance login form -->
      <div class="role-panel" id="panel-ambulance">
        <form method="POST" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="role" value="ambulance">
          <div class="form-group">
            <label>Phone or Ambulance Number</label>
            <input type="text" name="identifier" placeholder="9876543210 or AMB-001" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-danger btn-full">🚑 Ambulance Login</button>
        </form>
      </div>

      <!-- Admin login form (same as public, hidden separately) -->
      <div class="role-panel" id="panel-admin">
        <form method="POST" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="role" value="admin">
          <div class="form-group">
            <label>Admin Username</label>
            <input type="text" name="identifier" value="traffic-admin" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-warning btn-full">🔒 Admin Login</button>
        </form>
      </div>

      <div class="divider">or</div>
      <p style="text-align:center; color:var(--text-muted); font-size:.85rem;">
        New here?
        <a href="{{ url_for('auth.register') }}" style="color:var(--accent);">Create an account</a>
      </p>
    </div>
  </div>

  <script>
    function switchRole(role) {
      document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.role-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`[data-role="${role}"]`).classList.add('active');
      document.getElementById(`panel-${role}`).classList.add('active');
    }
  </script>
</body>
</html>
